spring:
  application:
    name: identity-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:migration

app:
  jwt:
    issuer: https://auth.loyalty360.io
    audience: admin
    access-token-expiry-minutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:15}
    refresh-token-expiry-days: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:14}
    private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
    key-id: ${JWT_KEY_ID:key-2026-04}
  security:
    max-failed-attempts: ${MAX_FAILED_ATTEMPTS:5}
    lock-duration-minutes: ${LOCK_DURATION_MINUTES:30}
    bcrypt-strength: ${BCRYPT_STRENGTH:12}

server:
  port: 8080
